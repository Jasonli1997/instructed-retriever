name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - release-*
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install "poetry>=2.1.0,<3.0.0"

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run pre-commit on all files
        run: poetry run pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install "poetry>=2.1.0,<3.0.0"

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Run tests
        run: poetry run pytest
